name: C2 Repo Integrity

on:
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  integrity:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: python -m pip install --upgrade pip pyyaml pytest jsonschema

      - name: Compile Python
        run: python -m compileall scripts tests

      - name: Parse YAML and JSON
        run: python scripts/c2_parse_check.py

      - name: Validate structure (strict)
        run: python scripts/c2_validate.py --strict

      - name: Score integrity check
        run: python scripts/c2_score_check.py

      - name: Secret scan
        run: python scripts/c2_secret_scan.py

      - name: Run all tests
        run: python -m pytest tests/ -v
