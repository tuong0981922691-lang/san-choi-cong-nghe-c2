name: C2 Validate Submission

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: python -m pip install --upgrade pip pyyaml pytest jsonschema

      - name: Compile Python (catch syntax errors)
        run: python -m compileall scripts tests

      - name: Parse YAML and JSON (catch malformed files)
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          import yaml

          SKIP = {".git", "node_modules", "__pycache__", ".venv", "venv"}
          errors = []

          for p in sorted(Path(".").rglob("*")):
              if not p.is_file():
                  continue
              if any(part in SKIP for part in p.parts):
                  continue
              if p.suffix in (".yaml", ".yml"):
                  try:
                      yaml.safe_load(p.read_text(encoding="utf-8"))
                  except Exception as e:
                      errors.append(f"YAML parse error: {p}: {e}")
              elif p.suffix == ".json":
                  try:
                      json.loads(p.read_text(encoding="utf-8"))
                  except Exception as e:
                      errors.append(f"JSON parse error: {p}: {e}")

          if errors:
              print("\n".join(errors))
              raise SystemExit(1)
          print(f"YAML/JSON parse OK")
          PY

      - name: Run C2 validator
        run: python scripts/c2_validate.py --strict

      - name: Run score check
        run: python scripts/c2_score_check.py

      - name: Run secret scan
        run: python scripts/c2_secret_scan.py

      - name: Run all tests
        run: python -m pytest tests/ -v
